name: TruyenQQ Daily Check-in

on:
  # Chạy tự động mỗi ngày vào lúc 00:30 UTC (tức 07:30 sáng giờ Việt Nam)
  schedule:
    - cron: '30 0 * * *'
  # Cho phép bấm chạy thủ công từ giao diện GitHub
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Cài đặt Playwright browsers và dependencies
        playwright install --with-deps chromium
        
    - name: Run check-in script
      env:
        TRUYENQQ_COOKIE: ${{ secrets.TRUYENQQ_COOKIE }}
        TRUYENQQ_EMAIL: ${{ secrets.TRUYENQQ_EMAIL }}
        TRUYENQQ_PASSWORD: ${{ secrets.TRUYENQQ_PASSWORD }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: python main.py
